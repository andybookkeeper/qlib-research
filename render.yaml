databases:
  - name: qlib-db
    plan: starter
    databaseName: qlib_trading
    user: qlib_user

services:
  - type: web
    name: qlib-api
    runtime: python
    plan: starter
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.qlib_research.app.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: FASTAPI_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: qlib-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://qlib-trading-ui.vercel.app,http://localhost:5173,http://localhost:3000
      - key: ENABLE_LIVE_TRADING
        value: "false"
      - key: PHASE3_ENABLE_LIVE_BROKER_ADAPTER
        value: "false"
      - key: PHASE3_ENABLE_BROKER_RECONCILIATION
        value: "false"
      - key: PHASE3_ENABLE_STRATEGY_AUTOMATION
        value: "false"
      - key: PHASE3_ENFORCE_MANUAL_TRADE_CONFIRMATION
        value: "true"
